services:
  postgres:
    image: postgres:16
    container_name: contractpulse-db
    environment:
      POSTGRES_DB: contractpulse
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - contractpulse_data:/var/lib/postgresql/data

volumes:
  contractpulse_data: